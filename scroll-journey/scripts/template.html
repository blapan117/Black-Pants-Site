<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>%%TITLE%% — scroll journey</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- GSAP + ScrollTrigger: turns scroll position into a 0->1 number and pins the section -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
  :root { --accent: %%ACCENT%%; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04090c; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

  .hero { height: 100vh; width: 100%; position: relative; overflow: hidden; background: #04090c; }

  /* The journey plays on a CANVAS: we draw the exact frame that matches scroll position,
     so every scroll pixel = a real frame = continuous, smooth motion. */
  #stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .vignette { position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(115% 80% at 50% 47%, rgba(0,0,0,0) 45%, rgba(0,0,0,0.45) 100%); }

  .loader { position: absolute; inset: 0; z-index: 30; display: grid; place-items: center;
    background: #04090c; transition: opacity .5s ease; }
  .loader.hide { opacity: 0; pointer-events: none; }
  .loader span { font-family: 'Cormorant Garamond', serif; font-style: italic; letter-spacing: .25em;
    color: var(--accent); font-size: 18px; }

  .nav { position: absolute; top: 26px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px; z-index: 10;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 999px; padding: 6px 8px; }
  .nav .close { width: 26px; height: 26px; border-radius: 999px; background: rgba(0,0,0,0.5);
    display: grid; place-items: center; font-size: 13px; margin-right: 4px; }
  .nav a { color: color-mix(in srgb, var(--accent) 22%, white); text-decoration: none; font-size: 12.5px;
    font-weight: 500; letter-spacing: 0.06em; padding: 7px 14px; border-radius: 999px; }
  .nav a:first-of-type { background: var(--accent); color: #05181c; }

  .card { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: min(760px, 80vw); padding: 52px 56px 46px; z-index: 6;
    background: rgba(6,20,24,0.42); backdrop-filter: blur(9px) saturate(1.1);
    -webkit-backdrop-filter: blur(9px) saturate(1.1);
    border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); border-radius: 26px;
    text-align: center; opacity: 0; }
  .card .eyebrow { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px;
    letter-spacing: 0.04em; color: color-mix(in srgb, var(--accent) 40%, white); opacity: 0.92; margin-bottom: 18px; }
  .card p { font-family: 'Cormorant Garamond', serif; font-weight: 500; color: #fff;
    font-size: clamp(26px, 3.4vw, 44px); line-height: 1.22; }
  .card p em { font-style: italic; color: var(--accent); }

  .headline { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 92vw; text-align: center; z-index: 7; opacity: 0;
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: clamp(48px, 9vw, 150px); line-height: 0.96; letter-spacing: 0.08em;
    text-shadow: 0 0 60px color-mix(in srgb, var(--accent) 45%, transparent), 0 4px 30px rgba(0,0,0,0.6); }
  .headline span { display: block; }
  .headline .thin { font-style: italic; font-weight: 400; opacity: 0.95; }

  .hint { position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); z-index: 8;
    font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: color-mix(in srgb, var(--accent) 30%, white);
    display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .hint .arrow { width: 18px; height: 18px; border-right: 2px solid var(--accent); border-bottom: 2px solid var(--accent);
    transform: rotate(45deg); animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(45deg); } 50% { transform: translateY(6px) rotate(45deg); } }

  /* infinite marquee = the ONE self-running, time-based motion (not scroll-driven) */
  .marquee { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 9; padding: 18px 0; overflow: hidden;
    background: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0));
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
  .marquee-track { display: flex; width: max-content; animation: slide 24s linear infinite; }
  .marquee-track span { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px;
    color: color-mix(in srgb, var(--accent) 30%, white); opacity: 0.85; padding: 0 46px; white-space: nowrap; }
  @keyframes slide { from { transform: translateX(0); } to { transform: translateX(-50%); } }
</style>
</head>
<body>

<section class="hero">
  <canvas id="stage"></canvas>
  <div class="vignette"></div>

  <nav class="nav"><div class="close">&times;</div>%%NAV%%</nav>

  <div class="card">
    <div class="eyebrow">%%EYEBROW%%</div>
    <p>%%CARD_HTML%%</p>
  </div>

  <div class="headline h1line"><span>%%H1_LINE1%%</span><span class="thin">%%H1_LINE2%%</span></div>
  <div class="headline final"><span>%%H2_LINE1%%</span><span class="thin">%%H2_LINE2%%</span></div>

  <div class="hint"><div>Scroll</div><div class="arrow"></div></div>

  <div class="marquee"><div class="marquee-track">%%MARQUEE%%%%MARQUEE%%</div></div>

  <div class="loader" id="loader"><span>loading…</span></div>
</section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  const FRAME_COUNT = %%FRAME_COUNT%%;
  const PAD = 3;
  const frameSrc = i => `images/frames/f_${String(i + 1).padStart(PAD, '0')}.jpg`;

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const images = new Array(FRAME_COUNT);
  let current = 0;

  function fitCanvas() {
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    draw(current);
  }
  function draw(idx) {
    const im = images[Math.max(0, Math.min(FRAME_COUNT - 1, idx | 0))];
    if (!im || !im.complete || !im.naturalWidth) return;
    const cw = canvas.width, ch = canvas.height;
    const s = Math.max(cw / im.naturalWidth, ch / im.naturalHeight);
    const w = im.naturalWidth * s, h = im.naturalHeight * s;
    ctx.drawImage(im, (cw - w) / 2, (ch - h) / 2, w, h);
  }

  let loaded = 0;
  for (let i = 0; i < FRAME_COUNT; i++) {
    const im = new Image();
    im.onload = () => {
      loaded++;
      if (i === 0) fitCanvas();
      if (loaded === Math.min(24, FRAME_COUNT)) document.getElementById('loader').classList.add('hide');
      if (loaded === FRAME_COUNT) ScrollTrigger.refresh();
    };
    im.src = frameSrc(i);
    images[i] = im;
  }
  window.addEventListener('resize', fitCanvas);

  const last = FRAME_COUNT - 1;
  const at = f => f / last;                 // frame number -> timeline position (0..1)
  const RUNWAY = Math.round(last * 19);     // ~19px of scroll per frame keeps motion smooth

  const proxy = { f: 0 };
  const tl = gsap.timeline({
    defaults: { ease: 'none' },
    scrollTrigger: { trigger: '.hero', start: 'top top', end: '+=' + RUNWAY, scrub: 0.6, pin: true, anticipatePin: 1 }
  });

  // reveal anchors as fractions of the journey (theme-independent):
  // clip1 always ENDS on the hero subject (~0.5), clip2 always ends on the finale (~1.0)
  tl
    .to(proxy, { f: last, duration: 1, onUpdate: () => { current = proxy.f; draw(current); } }, 0)
    .to('.hint', { opacity: 0, duration: 0.02 }, 0)
    .fromTo('.card', { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.06, ease: 'power2.out' }, 0.07)
    .to('.card',     { opacity: 0, y: -40, duration: 0.06, ease: 'power2.in' }, 0.20)
    .fromTo('.h1line',
      { opacity: 0, y: 80, letterSpacing: '0.5em' },
      { opacity: 1, y: 0, letterSpacing: '0.08em', duration: 0.07, ease: 'power2.out' }, 0.42)
    .to('.h1line', { opacity: 0, y: -30, duration: 0.06, ease: 'power2.in' }, 0.56)
    .fromTo('.final',
      { opacity: 0, y: 80, letterSpacing: '0.5em' },
      { opacity: 1, y: 0, letterSpacing: '0.08em', duration: 0.08, ease: 'power2.out' }, 0.84);
</script>
</body>
</html>
